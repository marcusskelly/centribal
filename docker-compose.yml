

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: centribal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  api:
    image: python:3.11
    working_dir: /app
    volumes:
      - .:/app
    command: >
      bash -c "
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    depends_on:
      - db